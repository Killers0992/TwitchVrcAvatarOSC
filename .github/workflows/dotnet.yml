name: .NET

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Publish
      run: |
        dotnet publish -c Release -o ../../TwitchBot -r win-x64 --self-contained true /p:UseAppHost=true
    - uses: actions/upload-artifact@v2
      with:
        name: Bot
        path: TwitchVrcAvatarOSC.exe

